global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rust-backend-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'rust-backend'
    static_configs:
      - targets: ['app:8080']
        labels:
          service: 'rust-backend'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['db:5432']
        labels:
          service: 'postgres'
    scrape_interval: 30s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
    scrape_interval: 30s
